name: Windows Player Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/windows-release.yml"
      - "CMakeLists.txt"
      - "configurable_player.cpp"
      - "release_embedded.cpp"
      - "src/**"
      - "include/**"
      - "tools/**"
      - "generated/embedded_video_cache.hpp"
      - "assets/**"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:RUNNER_TEMP/vcpkg"
          & "$env:RUNNER_TEMP/vcpkg/bootstrap-vcpkg.bat"
          "VCPKG_ROOT=$env:RUNNER_TEMP/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_TOOLCHAIN=$env:RUNNER_TEMP/vcpkg/scripts/buildsystems/vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install OpenCV
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT/vcpkg.exe" install opencv4:x64-windows

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          archives: "qtbase"
          use-official: true
          cache: true

      - name: Locate Qt
        shell: pwsh
        run: |
          $qtPrefix = qmake -query QT_INSTALL_PREFIX
          "QT_ROOT_DIR=$qtPrefix" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "QT_CMAKE_DIR=$qtPrefix/lib/cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure Embedded Release
        shell: pwsh
        run: |
          cmake -S . -B build-win-release `
            -G Ninja `
            -DBADAPPLE_RELEASE_ONLY=ON `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:QT_CMAKE_DIR"

      - name: Build Embedded Release
        shell: pwsh
        run: |
          cmake --build build-win-release --config Release --target BadAppleRelease

      - name: Configure Configurable Player
        shell: pwsh
        run: |
          cmake -S . -B build-win-configurable `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_TOOLCHAIN" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_PREFIX_PATH="$env:QT_CMAKE_DIR"

      - name: Build Configurable Player
        shell: pwsh
        run: |
          cmake --build build-win-configurable --config Release --target ConfigurablePlayer

      - name: Bundle Qt Runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/BadAppleRelease | Out-Null
          New-Item -ItemType Directory -Force -Path dist/ConfigurablePlayer | Out-Null
          Copy-Item build-win-release/BadAppleRelease.exe dist/BadAppleRelease/
          Copy-Item build-win-configurable/ConfigurablePlayer.exe dist/ConfigurablePlayer/
          windeployqt --release --compiler-runtime dist/BadAppleRelease/BadAppleRelease.exe
          windeployqt --release --compiler-runtime dist/ConfigurablePlayer/ConfigurablePlayer.exe
          Copy-Item "$env:VCPKG_ROOT/installed/x64-windows/bin/*.dll" dist/ConfigurablePlayer/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BadApplePlayers-windows
          path: dist/
